exclude: ^_vendor/|^node_modules/
repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: end-of-file-fixer
      - id: trailing-whitespace
      - id: check-yaml
      - id: check-toml
      - id: check-merge-conflict
      - id: check-added-large-files
        args: ["--maxkb=1000"]
      - id: mixed-line-ending
        args: ["--fix=lf"]
      - id: check-case-conflict
  - repo: https://github.com/executablebooks/mdformat
    rev: 1.0.0
    hooks:
      - id: mdformat
        args: ["--wrap", "120", "--number"]
        # layouts/*.md are Hugo templates (e.g. the raw-markdown output), not prose; reflowing breaks them
        exclude: ^layouts/
        additional_dependencies:
          - mdformat-beautysh>=1
          - mdformat-simple-breaks>=0.1
          - mdformat-hugo>=0.1
  - repo: https://github.com/rhysd/actionlint
    rev: "v1.7.12"
    hooks:
      - id: actionlint
  - repo: https://github.com/google/yamlfmt
    rev: v0.21.0
    hooks:
      - id: yamlfmt
        args: ["--formatter", "max_line_length=120,retain_line_breaks=true"]
  - repo: https://github.com/zizmorcore/zizmor-pre-commit
    rev: v1.26.1
    hooks:
      - id: zizmor
