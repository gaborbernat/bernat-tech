baseURL = "https://bernat.tech"
title = "Bernát Gábor — Python packaging, tox, virtualenv & open source"
locale = "en-US"
defaultContentLanguage = "en"
enableRobotsTXT = true
enableEmoji = true
enableGitInfo = true
disableHugoGeneratorInject = true
# topics have no standalone pages (disableKinds); topic navigation is the filter pills on /posts/ and the
# home page, both built from each post's front-matter topics. The taxonomy stays to power related posts.
disableKinds = ["taxonomy", "term"]
ignoreLogs = ["warning-goldmark-raw-html"]
timeout = "120s" # network-free build (project stats come from data/project_stats.json); headroom for image processing

pagination.pagerSize = 20

[params]
author = "Bernát Gábor"
description = "Engineering notes from Bernát Gábor — PyPA maintainer of tox, virtualenv, pipx, filelock, and platformdirs. Python packaging, type hints, and supply chain security."
keywords = "python packaging,tox,virtualenv,pipx,pep 517,pep 518,type hints,mypy,python supply chain,sbom,bernat gabor"
images = ["img/avatar.webp"]
avatarurl = "img/avatar.webp"
dateFormat = "2006-01-02"
colorScheme = "auto"
hidecolorschemetoggle = false
customCSS = [
    "css/custom.css",
]
favicon_16 = "img/android-chrome-192x192.png"
favicon_32 = "img/android-chrome-192x192.png"
touchIcon = "img/android-chrome-192x192.png"

[params.Entry]
toc = true

