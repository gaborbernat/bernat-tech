{{- $u := urls.Parse .Destination -}}
{{- $external := and $u.IsAbs (ne $u.Hostname "") (not (strings.HasSuffix $u.Hostname "bernat.tech")) -}}
<a href="{{ .Destination | safeURL }}"
  {{- with .Title }} title="{{ . }}"{{ end }}
  {{- if $external }} target="_blank" rel="noopener"{{ end -}}
>{{ .Text | safeHTML }}</a>
