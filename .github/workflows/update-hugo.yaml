name: Update Hugo Version
on:
  schedule:
    - cron: "0 0 * * 1"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  update-hugo:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Get current Hugo version
        id: current
        run: |
          CURRENT_VERSION=$(grep -oP 'HUGO_VERSION: "\K[^"]+' .github/workflows/build.yaml)
          echo "version=$CURRENT_VERSION" >> "$GITHUB_OUTPUT"

      - name: Get latest Hugo version
        id: latest
        run: |
          LATEST_VERSION=$(curl -s https://api.github.com/repos/gohugoio/hugo/releases/latest | jq -r '.tag_name' | sed 's/^v//')
          echo "version=$LATEST_VERSION" >> "$GITHUB_OUTPUT"

      - name: Check if update needed
        id: check
        run: |
          if [ "${STEPS_CURRENT_OUTPUTS_VERSION}" != "${STEPS_LATEST_OUTPUTS_VERSION}" ]; then
            echo "needed=true" >> "$GITHUB_OUTPUT"
          else
            echo "needed=false" >> "$GITHUB_OUTPUT"
          fi
        env:
          STEPS_CURRENT_OUTPUTS_VERSION: ${{ steps.current.outputs.version }}
          STEPS_LATEST_OUTPUTS_VERSION: ${{ steps.latest.outputs.version }}

      - name: Update Hugo version
        if: steps.check.outputs.needed == 'true'
        run: |
          sed -i "s/HUGO_VERSION: \"[^\"]*\"/HUGO_VERSION: \"${STEPS_LATEST_OUTPUTS_VERSION}\"/" .github/workflows/build.yaml
        env:
          STEPS_LATEST_OUTPUTS_VERSION: ${{ steps.latest.outputs.version }}

      - name: Create Pull Request
        if: steps.check.outputs.needed == 'true'
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1 # v8.1.1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: Bump Hugo from ${{ steps.current.outputs.version }} to ${{ steps.latest.outputs.version }}
          title: "Bump Hugo from ${{ steps.current.outputs.version }} to ${{ steps.latest.outputs.version }}"
          body: |
            ## Update Hugo Version

            This PR updates Hugo from `${{ steps.current.outputs.version }}` to `${{ steps.latest.outputs.version }}`.

            ### Changes
            - Updated HUGO_VERSION in `.github/workflows/build.yaml`

            ### Release Notes
            https://github.com/gohugoio/hugo/releases/tag/v${{ steps.latest.outputs.version }}

            ---
            🤖 Generated by automated Hugo version update workflow
          branch: update-hugo-${{ steps.latest.outputs.version }}
          delete-branch: true
          labels: |
            dependencies
            automated
