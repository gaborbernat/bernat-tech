name: Build and deploy
on:
  workflow_dispatch:
  push:
    branches: ["main"]
  pull_request:
  schedule:
    - cron: "0 * * * *"

concurrency:
  # keep the event kinds in separate groups so the hourly cron never cancels a push (or vice versa);
  # supersede only within a kind, and never cancel a scheduled run mid-flight
  group: ${{ github.workflow }}-${{ github.ref }}-${{ github.event_name }}
  cancel-in-progress: ${{ github.event_name != 'schedule' }}

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    environment: build
    env:
      HUGO_CACHEDIR: /tmp/hugo_cache
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Read Hugo version
        run: echo "HUGO_VERSION=$(cat .hugo-version)" >> "$GITHUB_ENV"
      - name: Setup Hugo
        uses: peaceiris/actions-hugo@2752ce1d29631191ea3f27c23495fa06139a5b78 # v3.2.1
        with:
          hugo-version: ${{ env.HUGO_VERSION }}
          extended: true
      - name: Install Dart Sass
        # the SCSS pipeline transpiles with Dart Sass (css.Sass transpiler=dartsass); the extended
        # Hugo binary only bundles the deprecated LibSass, so ship the standalone binary on PATH
        run: |
          version=1.101.0
          curl -sSfL "https://github.com/sass/dart-sass/releases/download/${version}/dart-sass-${version}-linux-x64.tar.gz" | tar -xz -C "$HOME"
          echo "$HOME/dart-sass" >> "$GITHUB_PATH"
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: npm
      - name: Cache node_modules
        id: node-modules
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          # the whole tree (incl. the vnu.jar the html validator downloads on install) keyed on the lockfile
          path: node_modules
          key: ${{ runner.os }}-node-modules-${{ hashFiles('package-lock.json') }}
      - if: steps.node-modules.outputs.cache-hit != 'true'
        run: npm ci
      - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          # scripts carry PEP 723 inline deps and there is no lockfile, so key the cache off the scripts
          cache-dependency-glob: scripts/*.py
      - uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: |
            /tmp/hugo_cache
            resources/_gen
          key: ${{ runner.os }}-hugo-${{ github.run_id }}
          restore-keys: |
            ${{ runner.os }}-hugo-
      - name: Cache rendered mermaid diagrams
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          # unchanged diagrams reuse their cached SVG, so the browser is not launched for them
          path: .cache/mermaid
          key: ${{ runner.os }}-mermaid-${{ github.run_id }}
          restore-keys: ${{ runner.os }}-mermaid-
      - name: Restore hourly-refreshed project stats
        uses: actions/cache/restore@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          # refresh-stats.yaml writes this off the hot path; a miss falls back to the committed file
          path: data/project_stats.json
          key: ${{ runner.os }}-project-stats-${{ github.run_id }}
          restore-keys: ${{ runner.os }}-project-stats-
      - name: Record post publish dates
        run: uv run scripts/publish_dates.py
      - name: Build
        run: hugo --minify --gc
        env:
          HUGO_PARAMS_BUILDCOMMIT: ${{ github.sha }}
      - name: Check whether any mermaid diagram needs rendering
        id: mermaid
        run: echo "misses=$(node scripts/mermaid.mjs --check)" >> "$GITHUB_OUTPUT"
      # only restore the 270 MB browser and install it when a diagram actually changed
      - name: Cache the Playwright browser
        if: steps.mermaid.outputs.misses != '0'
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('package-lock.json') }}
          restore-keys: ${{ runner.os }}-playwright-
      - name: Install Chromium for mermaid rendering
        if: steps.mermaid.outputs.misses != '0'
        run: npx playwright install chromium
      - name: Post-process, optimize, and validate in parallel
        run: |
          # images are independent of the HTML/font work, so optimize them in the background
          ( sudo apt-get update -qq && sudo apt-get install -y -qq optipng libjpeg-turbo-progs &&
            find public -name '*.png' -print0 | xargs -0 -r optipng -quiet -o2 -strip all &&
            find public \( -name '*.jpg' -o -name '*.jpeg' \) -print0 | while IFS= read -r -d '' f; do
              if jpegtran -optimize -progressive -copy none "$f" >"$f.opt" 2>/dev/null; then mv "$f.opt" "$f"; else rm -f "$f.opt"; fi
            done ) & images=$!
          # highlight and mermaid both rewrite the same HTML files, so keep them serial
          node scripts/highlight.mjs
          node scripts/mermaid.mjs
          # HTML is final: validate it (a gate) while the fonts subset, since both only read the HTML
          java -jar "$(node -p 'String(require("vnu-jar"))')" --errors-only --skip-non-html public & validate=$!
          uv run scripts/subset-fa.py
          wait "$validate"
          wait "$images" || echo "::warning::image optimization failed"
      - name: Validate RSS feed
        run: python3 -c "import xml.etree.ElementTree as ET; ET.parse('public/index.xml')"
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          path: public
          # keep /.well-known/security.txt; the action otherwise strips all dot-dirs (.git/.github still excluded)
          include-hidden-files: true

  deploy:
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    needs:
      - build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    permissions:
      pages: write
      id-token: write
    concurrency:
      group: pages
      cancel-in-progress: false
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0
