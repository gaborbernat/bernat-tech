name: Build and deploy
on:
  workflow_dispatch:
  push:
    branches: ["main"]
  pull_request:
  schedule:
    - cron: "0 * * * *"

concurrency:
  # keep the event kinds in separate groups so the hourly cron never cancels a push (or vice versa);
  # supersede only within a kind, and never cancel a scheduled run mid-flight
  group: ${{ github.workflow }}-${{ github.ref }}-${{ github.event_name }}
  cancel-in-progress: ${{ github.event_name != 'schedule' }}

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    environment: build
    env:
      HUGO_CACHEDIR: /tmp/hugo_cache
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Read Hugo version
        run: echo "HUGO_VERSION=$(cat .hugo-version)" >> "$GITHUB_ENV"
      - name: Setup Hugo
        uses: peaceiris/actions-hugo@2752ce1d29631191ea3f27c23495fa06139a5b78 # v3.2.1
        with:
          hugo-version: ${{ env.HUGO_VERSION }}
          extended: true
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 26
          cache: npm
      - run: npm ci
      - uses: astral-sh/setup-uv@d31148d669074a8d0a63714ba94f3201e7020bc3 # v8.3.0
        with:
          # scripts carry PEP 723 inline deps and there is no lockfile, so key the cache off the scripts
          cache-dependency-glob: scripts/*.py
      - name: Install Chromium for build-time mermaid rendering
        run: npx playwright install --with-deps chromium
      - uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: |
            /tmp/hugo_cache
            resources/_gen
          key: ${{ runner.os }}-hugo-${{ github.run_id }}
          restore-keys: |
            ${{ runner.os }}-hugo-
      - name: Refresh project stats
        # only on main (PRs lack the secret); non-fatal, so a flaky API falls back to the committed file
        if: github.ref == 'refs/heads/main'
        continue-on-error: true
        run: uv run scripts/prefetch_projects.py
        env:
          HUGO_GITHUB_TOKEN: ${{ secrets.HUGO_GITHUB_TOKEN }}
      - name: Build
        run: hugo --minify --gc
        env:
          HUGO_PARAMS_BUILDCOMMIT: ${{ github.sha }}
      - name: Highlight code
        run: node scripts/highlight.mjs
      - name: Pack tag word cloud
        run: uv run scripts/wordcloud.py
      - name: Render mermaid diagrams to static SVG
        run: node scripts/mermaid.mjs
      - name: Subset FontAwesome fonts to used glyphs
        run: uv run scripts/subset-fa.py
      - name: Optimize raster images (lossless)
        run: |
          sudo apt-get update -qq && sudo apt-get install -y -qq optipng libjpeg-turbo-progs
          find public -name '*.png' -print0 | xargs -0 -r optipng -quiet -o2 -strip all
          find public \( -name '*.jpg' -o -name '*.jpeg' \) -print0 | while IFS= read -r -d '' f; do
            if jpegtran -optimize -progressive -copy none "$f" > "$f.opt" 2>/dev/null; then
              mv "$f.opt" "$f"
            else
              rm -f "$f.opt"
            fi
          done
      - name: Validate HTML
        uses: Cyb3r-Jak3/html5validator-action@4ea5e57383ed7e14432ebbaae1b64893b7c5210b # v8.0.0
        with:
          root: public/
          css: false
      - name: Validate RSS feed
        run: python3 -c "import xml.etree.ElementTree as ET; ET.parse('public/index.xml')"
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          path: public
          # keep /.well-known/security.txt; the action otherwise strips all dot-dirs (.git/.github still excluded)
          include-hidden-files: true

  deploy:
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    needs:
      - build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    permissions:
      pages: write
      id-token: write
    concurrency:
      group: pages
      cancel-in-progress: false
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0
