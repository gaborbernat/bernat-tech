name: Refresh project stats
on:
  workflow_dispatch:
  schedule:
    # every 6h; the "N ago" labels recompute on every build, so only the raw counts need refreshing
    - cron: "15 */6 * * *"

concurrency:
  group: refresh-projects
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    environment: build
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 26
          cache: npm
      - run: npm ci
      - name: Fetch project stats
        run: node scripts/prefetch-projects.mjs
        env:
          HUGO_GITHUB_TOKEN: ${{ secrets.HUGO_GITHUB_TOKEN }}
      - name: Commit if changed
        run: |
          if [ -z "$(git status --porcelain data/project_stats.json)" ]; then
            echo "No stat changes"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/project_stats.json
          git commit -m "Refresh project stats"
          git push
