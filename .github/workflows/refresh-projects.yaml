name: Refresh project stats
on:
  workflow_dispatch:
  schedule:
    # every 6h; the "N ago" labels recompute on every build, so only the raw counts need refreshing
    - cron: "15 */6 * * *"

concurrency:
  group: refresh-projects
  cancel-in-progress: false

permissions:
  contents: write
  actions: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    environment: build
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: true
      - uses: astral-sh/setup-uv@d31148d669074a8d0a63714ba94f3201e7020bc3 # v8.3.0
      - name: Fetch project stats
        run: uv run scripts/prefetch_projects.py
        env:
          HUGO_GITHUB_TOKEN: ${{ secrets.HUGO_GITHUB_TOKEN }}
      - name: Commit and trigger a deploy if the stats changed
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if [ -z "$(git status --porcelain data/project_stats.json)" ]; then
            echo "No stat changes"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/project_stats.json
          git commit -m "Refresh project stats"
          git push
          # the push above uses GITHUB_TOKEN, which does not fire other workflows, so deploy explicitly
          gh workflow run build.yaml --ref main
